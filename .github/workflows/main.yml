name: macOS VNC - CLOUDFLARE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 9999

    steps:
      - name: Install Cloudflared
        shell: bash
        run: |
          brew install cloudflare/cloudflare/cloudflared
          echo "✅ Cloudflared Installed!"

      - name: Enable VNC / Screen Sharing
        shell: bash
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -restart \
            -agent \
            -privs -all \
            -allowAccessFor -allUsers

          echo "✅ VNC Enabled!"

      - name: Set VNC Password
        shell: bash
        run: |
          set -e

          sudo mkdir -p /Library/Preferences

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -restart \
            -agent \
            -privs -all \
            -clientopts \
            -setvnclegacy -vnclegacy yes \
            -setvncpw -vncpw "P@ssw0rd123!"

          sudo /usr/libexec/PlistBuddy \
            -c "Add :VNCLegacyPasswords array" \
            /Library/Preferences/com.apple.RemoteManagement.plist \
            2>/dev/null || true

          sudo /usr/libexec/PlistBuddy \
            -c "Delete :VNCLegacyPasswords:0" \
            /Library/Preferences/com.apple.RemoteManagement.plist \
            2>/dev/null || true

          HASH=$(python3 -c "import hashlib; print(hashlib.md5(b'P@ssw0rd123!').hexdigest())")

          sudo /usr/libexec/PlistBuddy \
            -c "Add :VNCLegacyPasswords:0 data $(echo \"$HASH\" | xxd -r -p | base64)" \
            /Library/Preferences/com.apple.RemoteManagement.plist || true

          sudo launchctl unload /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

          echo "✅ VNC Password Set!"

      - name: Start Cloudflare Tunnel
        shell: bash
        run: |
          echo "============================================"
          echo "🚀 macOS VNC - CLOUDFLARE TUNNEL"
          echo "============================================"

          cloudflared tunnel --url tcp://localhost:5900 > tunnel.log 2>&1 &

          sleep 20

          echo ""
          echo "Tunnel URL:"
          grep -o 'https://[^[:space:]]*trycloudflare.com' tunnel.log || true

          echo ""
          echo "PASSWORD : P@ssw0rd123!"
          echo "OS       : $(sw_vers -productVersion)"
          echo "ARCH     : $(uname -m)"
          echo ""

      - name: Keep Session Alive
        shell: bash
        run: |
          while true; do
            echo "✓ Active - $(date)"
            sleep 60
          done
