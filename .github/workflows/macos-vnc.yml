name: macOS noVNC - CLOUDFLARE

on:
workflow_dispatch:

jobs:
build:
runs-on: macos-latest
timeout-minutes: 360

steps:
  - name: Install Dependencies
    run: |
      brew update
      brew install tigervnc novnc websockify cloudflare/cloudflare/cloudflared

  - name: Enable Screen Sharing
    run: |
      sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
        -activate -configure -access -on -restart -agent -privs -all -allowAccessFor -allUsers

  - name: Configure VNC Password
    run: |
      mkdir -p ~/.vnc

      cat > ~/.vnc/passwd.txt << EOF
      P@ssw0rd123!
      EOF

      vncpasswd -f < ~/.vnc/passwd.txt > ~/.vnc/passwd
      chmod 600 ~/.vnc/passwd

  - name: Start VNC Server
    run: |
      /opt/homebrew/bin/Xvnc :1 \
        -geometry 1440x900 \
        -depth 24 \
        -rfbauth ~/.vnc/passwd \
        -rfbport 5901 \
        > vnc.log 2>&1 &

      sleep 10

  - name: Start noVNC
    run: |
      NOVNC_DIR=$(brew --prefix novnc)/share/novnc

      websockify \
        --web "$NOVNC_DIR" \
        6080 \
        localhost:5901 \
        > websockify.log 2>&1 &

      sleep 5

  - name: Start Cloudflare Tunnel
    run: |
      cloudflared tunnel \
        --url http://localhost:6080 \
        > tunnel.log 2>&1 &

      sleep 20

      echo ""
      echo "=========================================="
      echo "🚀 noVNC READY"
      echo "=========================================="
      grep -o 'https://[^[:space:]]*trycloudflare.com' tunnel.log || true
      echo ""
      echo "PASSWORD : P@ssw0rd123!"
      echo "DISPLAY  : :1"
      echo "=========================================="

  - name: Keep Alive
    run: |
      while true; do
        echo "✓ Active $(date)"
        sleep 60
      done
